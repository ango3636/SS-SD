project:
  name: suturing-stable-diffusion-pipeline
  random_seed: 42

paths:
  data_root: jigsaw
  output_root: ./outputs
  trial_index_csv: ./outputs/trial_index.csv
  detection_metadata_csv: ./outputs/detection/detections.csv
  kinematics_features_csv: ./outputs/kinematics/features.csv
  synthesis_output_dir: ./outputs/synthesis

ingestion:
  source: gdrive
  tasks: []
  jigsaw_root_name: jigsaw
  video_extensions: [".avi", ".mp4", ".mov"]
  kinematics_keywords: ["kinematics", "kinematic"]
  transcription_keywords: ["transcription", "gesture", "transcript"]
  frame_rate_hz: 30.0
  gdrive:
    credentials_path: ./secrets/google_oauth_client.json
    token_path: ./secrets/google_token.json
    scopes: ["https://www.googleapis.com/auth/drive.readonly"]
    oauth_flow: console
    root_folder_id: "1Fk871tO8Wda02Xv5lXmmnaGQWEDl12RL"
    materialize_local: true
    cache_dir: ./data/gdrive_cache

detection:
  use_yolo: true
  yolo_weights: yolov8n.pt
  target_class_names: ["needle_head", "suture_needle", "needle"]
  strict_target_class_names: true
  conf_threshold: 0.25
  iou_threshold: 0.45
  img_size: 640
  min_box_area: 600
  save_full_frame_if_detected: true
  save_crops_if_detected: true
  save_annotated_frames: true

motion_fallback:
  min_area: 1200
  blur_kernel: 7
  threshold_binary: 25

sequence:
  seq_len: 16
  seq_stride: 8
  img_size: 224
  num_classes: 3
  batch_size: 4

kinematics:
  # 0-based indices; master-left translational / rotational velocity (JIGSAWS 1-based 13–15 / 16–18)
  translational_velocity_cols: [12, 13, 14]
  rotational_velocity_cols: [15, 16, 17]
  savgol_window: 11
  savgol_polyorder: 3
  sampling_hz: 30.0

dashboard:
  app_title: Suturing Comparison Dashboard
